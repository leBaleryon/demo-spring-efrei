name: Spring Boot CI/CD

# Pipeline DevSecOps complet :
# Build & test -> Analyse SonarQube -> Publication JAR vers Nexus -> Scan Trivy -> Push image Docker Hub.
# SonarQube et Nexus sont demarres DANS le job (les runners cloud ne joignent pas un localhost perso).

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build, Test, Sonar & Nexus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Elasticsearch (embarque dans SonarQube) exige cette valeur
      - name: Tune kernel for SonarQube
        run: sudo sysctl -w vm.max_map_count=262144

      - name: Start Nexus container
        run: docker run -d --name nexus -p 8081:8081 sonatype/nexus3

      - name: Start SonarQube container
        run: docker run -d --name sonarqube -p 9000:9000 sonarqube:lts-community

      - name: Build & test with Maven
        run: mvn -B clean verify

      # ---------- SonarQube ----------
      - name: Wait for SonarQube to be UP
        run: |
          for i in $(seq 1 60); do
            if curl -s http://localhost:9000/api/system/status | grep -q '"status":"UP"'; then
              echo "SonarQube UP"; exit 0
            fi
            echo "waiting sonar... ($i)"; sleep 5
          done
          echo "SonarQube n'a pas demarre"; docker logs sonarqube | tail -30; exit 1

      - name: Generate SonarQube token
        run: |
          curl -s -u admin:admin -X POST "http://localhost:9000/api/users/change_password?login=admin&previousPassword=admin&password=Sonar2026%21" >/dev/null
          TOK=$(curl -s -u admin:'Sonar2026!' -X POST "http://localhost:9000/api/user_tokens/generate?name=ci-token" | python3 -c "import sys,json;print(json.load(sys.stdin)['token'])")
          echo "::add-mask::$TOK"
          echo "SONAR_TOKEN=$TOK" >> "$GITHUB_ENV"

      - name: SonarQube analysis
        run: |
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.projectKey=springboot-app

      # ---------- Nexus ----------
      - name: Wait for Nexus to be UP
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8081/service/rest/v1/status)
            if [ "$code" = "200" ]; then echo "Nexus UP"; exit 0; fi
            echo "waiting nexus... ($i)"; sleep 5
          done
          echo "Nexus n'a pas demarre"; docker logs nexus | tail -30; exit 1

      - name: Configure Nexus (EULA + repo spring-releases)
        run: |
          PW=$(docker exec nexus cat /nexus-data/admin.password | tr -d '\r\n')
          echo "::add-mask::$PW"
          echo "NEXUS_PW=$PW" >> "$GITHUB_ENV"
          python3 - "$PW" <<'PY'
          import sys,json,base64,urllib.request
          pw=sys.argv[1]; base="http://localhost:8081"
          auth=base64.b64encode(f"admin:{pw}".encode()).decode()
          hdr={"Authorization":"Basic "+auth,"Content-Type":"application/json"}
          req=urllib.request.Request(base+"/service/rest/v1/system/eula",headers=hdr)
          eula=json.load(urllib.request.urlopen(req)); eula["accepted"]=True
          data=json.dumps(eula).encode()
          urllib.request.urlopen(urllib.request.Request(base+"/service/rest/v1/system/eula",data=data,headers=hdr,method="POST"))
          print("EULA accepted")
          PY
          curl -s -u admin:"$PW" -X POST "http://localhost:8081/service/rest/v1/repositories/maven/hosted" \
            -H "Content-Type: application/json" -d '{
              "name":"spring-releases","online":true,
              "storage":{"blobStoreName":"default","strictContentTypeValidation":true,"writePolicy":"ALLOW"},
              "maven":{"versionPolicy":"MIXED","layoutPolicy":"STRICT","contentDisposition":"INLINE"}
            }' -w "create repo HTTP %{http_code}\n"

      - name: Publish JAR to Nexus
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>nexus</id>
                <username>admin</username>
                <password>${NEXUS_PW}</password>
              </server>
            </servers>
          </settings>
          EOF
          mvn -B deploy -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: target/*.jar

  docker:
    name: Trivy Scan & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-jar
          path: target

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest .

      # ---------- Trivy : scan de securite de l'image ----------
      - name: Scan image with Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 0 \
            ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest
